<div class="top-bar">
  <div class="container top-bar__inner">
      <span class="top-bar__tag bilingual" data-en="{{ site_settings.topbar_tag_en }}" data-am="{{ site_settings.topbar_tag_am|default:site_settings.topbar_tag_en }}">{{ site_settings.topbar_tag_en }}</span>
      <div class="top-bar__actions">
        <a href="tel:{{ site_settings.phone|cut:' ' }}" class="top-bar__link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          <span class="top-bar__text">{{ site_settings.phone }}</span>
        </a>
        <a href="mailto:{{ site_settings.email }}" class="top-bar__link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span class="top-bar__text">{{ site_settings.email }}</span>
      </a>
      <div class="lang-switch">
        {% for lang in site_languages %}
        <button class="lang-switch__btn{% if forloop.first %} active{% endif %}" data-lang="{{ lang.code }}" title="{{ lang.name }}">{{ lang.label }}</button>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
